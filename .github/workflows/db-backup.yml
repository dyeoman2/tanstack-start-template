name: 🗄️ Database Backup to S3 (Weekly)

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch: {}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  convex_export_to_s3:
    name: Export Convex -> S3
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_DR_BACKUP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DR_BACKUP_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DR_BACKUP_REGION || 'us-west-1' }}

      - name: Export Convex production database
        id: export
        run: |
          timestamp=$(date -u +"%Y-%m-%dT%H%M%SZ")
          zip_file="convex-backup-${timestamp}.zip"

          pnpm exec convex export --path "$zip_file"

          file_size=$(stat -c%s "$zip_file")
          file_size_mb=$(echo "scale=2; $file_size / 1048576" | bc)

          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"
          echo "zip_file=${zip_file}" >> "$GITHUB_OUTPUT"
          echo "file_size_mb=${file_size_mb}" >> "$GITHUB_OUTPUT"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Upload to S3
        id: upload
        run: |
          s3_key="convex-backups/${ZIP_FILE}"

          aws s3 cp \
            "${ZIP_FILE}" \
            "s3://${AWS_DR_BACKUP_S3_BUCKET}/${s3_key}" \
            --sse aws:kms \
            --sse-kms-key-id "${AWS_DR_BACKUP_KMS_KEY_ARN}"

          echo "s3_key=${s3_key}" >> "$GITHUB_OUTPUT"
        env:
          AWS_DR_BACKUP_KMS_KEY_ARN: ${{ secrets.AWS_DR_BACKUP_KMS_KEY_ARN }}
          AWS_DR_BACKUP_S3_BUCKET: ${{ secrets.AWS_DR_BACKUP_S3_BUCKET }}
          ZIP_FILE: ${{ steps.export.outputs.zip_file }}

      - name: Verify upload
        run: |
          result=$(aws s3api head-object \
            --bucket "${AWS_DR_BACKUP_S3_BUCKET}" \
            --key "${S3_KEY}" \
            --query '{Size: ContentLength, ETag: ETag, SSE: ServerSideEncryption, SSEKMSKeyId: SSEKMSKeyId}' \
            --output json)

          echo "$result" | jq .

          s3_size=$(echo "$result" | jq -r '.Size')
          sse=$(echo "$result" | jq -r '.SSE')
          sse_kms_key_id=$(echo "$result" | jq -r '.SSEKMSKeyId')
          if [[ "$s3_size" -lt 100 ]]; then
            echo "ERROR: Uploaded file is suspiciously small (${s3_size} bytes)"
            exit 1
          fi

          if [[ "$sse" != "aws:kms" ]]; then
            echo "ERROR: Expected aws:kms encryption, found ${sse}"
            exit 1
          fi

          if [[ "$sse_kms_key_id" != "${AWS_DR_BACKUP_KMS_KEY_ARN}" ]]; then
            echo "ERROR: Expected KMS key ${AWS_DR_BACKUP_KMS_KEY_ARN}, found ${sse_kms_key_id}"
            exit 1
          fi
        env:
          AWS_DR_BACKUP_KMS_KEY_ARN: ${{ secrets.AWS_DR_BACKUP_KMS_KEY_ARN }}
          AWS_DR_BACKUP_S3_BUCKET: ${{ secrets.AWS_DR_BACKUP_S3_BUCKET }}
          S3_KEY: ${{ steps.upload.outputs.s3_key }}

      - name: Deploy test - push functions to local Convex
        id: deploy_test
        run: |
          docker run -d --name convex-dr-test \
            -p 3210:3210 \
            -p 3211:3211 \
            ghcr.io/get-convex/convex-backend:latest@sha256:a4a0c06c76b78ed6342730d326b79c0427ec1681d7723514602eb41b37ff2d56

          for i in $(seq 1 30); do
            docker exec convex-dr-test \
              curl -sf http://localhost:3210/version > /dev/null 2>&1 && break
            sleep 1
          done

          admin_key=$(docker exec convex-dr-test bash -c \
            'cd /convex && ./generate_admin_key.sh 2>&1 | tail -1')

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex env set APP_NAME "$DR_TEST_APP_NAME"

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex env set APP_URL "$DR_TEST_APP_URL"

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex env set BETTER_AUTH_URL "$DR_TEST_BETTER_AUTH_URL"

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex env set BETTER_AUTH_SECRET "$DR_TEST_BETTER_AUTH_SECRET"

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex env set JWKS "$DR_TEST_JWKS"

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex deploy
        env:
          DR_TEST_APP_NAME: ${{ secrets.DR_TEST_APP_NAME || 'TanStack Start Template DR Test' }}
          DR_TEST_APP_URL: ${{ secrets.DR_TEST_APP_URL || 'http://127.0.0.1:3000' }}
          DR_TEST_BETTER_AUTH_SECRET: ${{ secrets.DR_TEST_BETTER_AUTH_SECRET || 'dr-test-only-better-auth-secret-0123456789abcdef' }}
          DR_TEST_BETTER_AUTH_URL: ${{ secrets.DR_TEST_BETTER_AUTH_URL || 'http://127.0.0.1:3000' }}
          DR_TEST_JWKS: ${{ secrets.DR_TEST_JWKS || '{"keys":[]}' }}

      - name: Restore test - import into local Convex
        id: restore_test
        run: |
          admin_key=$(docker exec convex-dr-test bash -c \
            'cd /convex && ./generate_admin_key.sh 2>&1 | tail -1')

          CONVEX_SELF_HOSTED_URL=http://localhost:3210 \
          CONVEX_SELF_HOSTED_ADMIN_KEY="$admin_key" \
          pnpm exec convex import --replace-all -y "${ZIP_FILE}"
        env:
          ZIP_FILE: ${{ steps.export.outputs.zip_file }}

      - name: Cleanup
        if: always()
        run: |
          docker rm -f convex-dr-test 2>/dev/null || true
          rm -rf ./convex-export-* ./convex-backup-*.zip

      - name: Report backup verification to control workspace
        id: workspace_report
        if: always()
        continue-on-error: true
        run: |
          artifact_payload=$(jq -n \
            --arg bucket "${AWS_DR_BACKUP_S3_BUCKET}" \
            --arg deploy_test_outcome "${{ steps.deploy_test.outcome }}" \
            --arg event_name "${GITHUB_EVENT_NAME}" \
            --arg export_outcome "${{ steps.export.outcome }}" \
            --arg file_size_mb "${{ steps.export.outputs.file_size_mb }}" \
            --arg job "convex_export_to_s3" \
            --arg ref_name "${GITHUB_REF_NAME}" \
            --arg restore_test_outcome "${{ steps.restore_test.outcome }}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_number "${GITHUB_RUN_NUMBER}" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg s3_key "${{ steps.upload.outputs.s3_key }}" \
            --arg sha "${GITHUB_SHA}" \
            --arg upload_outcome "${{ steps.upload.outcome }}" \
            --arg zip_file "${{ steps.export.outputs.zip_file }}" \
            '{
              workflow: {
                eventName: $event_name,
                job: $job,
                refName: $ref_name,
                runAttempt: $run_attempt,
                runId: $run_id,
                runNumber: $run_number,
                runUrl: $run_url,
                sha: $sha
              },
              backup: {
                bucket: if $bucket == "" then null else $bucket end,
                fileSizeMb: if $file_size_mb == "" then null else $file_size_mb end,
                s3Key: if $s3_key == "" then null else $s3_key end,
                zipFile: if $zip_file == "" then null else $zip_file end
              },
              results: {
                deployTest: $deploy_test_outcome,
                export: $export_outcome,
                restoreTest: $restore_test_outcome,
                upload: $upload_outcome
              }
            }')

          failure_reason=$(jq -rn \
            --arg deploy_test_outcome "${{ steps.deploy_test.outcome }}" \
            --arg export_outcome "${{ steps.export.outcome }}" \
            --arg restore_test_outcome "${{ steps.restore_test.outcome }}" \
            --arg upload_outcome "${{ steps.upload.outcome }}" \
            '[
              ["export", $export_outcome],
              ["upload", $upload_outcome],
              ["deployTest", $deploy_test_outcome],
              ["restoreTest", $restore_test_outcome]
            ]
            | map(select(.[1] != "success") | "\(.[0]):\(.[1])")
            | if length == 0 then "" else join(", ") end')

          if [[ -n "${failure_reason}" ]]; then
            status="failure"
            summary="GitHub Actions backup verification failed for run ${GITHUB_RUN_NUMBER}: ${failure_reason}."
          else
            status="success"
            summary="GitHub Actions backup and restore verification succeeded for run ${GITHUB_RUN_NUMBER}."
          fi

          evidence_summary=$(jq -rn \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg event_name "${GITHUB_EVENT_NAME}" \
            --arg s3_key "${{ steps.upload.outputs.s3_key }}" \
            --arg file_size_mb "${{ steps.export.outputs.file_size_mb }}" \
            --arg export_outcome "${{ steps.export.outcome }}" \
            --arg upload_outcome "${{ steps.upload.outcome }}" \
            --arg deploy_test_outcome "${{ steps.deploy_test.outcome }}" \
            --arg restore_test_outcome "${{ steps.restore_test.outcome }}" \
            '[
              "GitHub Actions run: \($run_url)",
              "Event: \($event_name)",
              "Backup object: \(if $s3_key == \"\" then \"not_uploaded\" else $s3_key end)",
              "Archive size: \(if $file_size_mb == \"\" then \"unknown\" else ($file_size_mb + \" MB\") end)",
              "Step outcomes: export=\($export_outcome), upload=\($upload_outcome), deployTest=\($deploy_test_outcome), restoreTest=\($restore_test_outcome)"
            ] | join("\n")')

          drill_id="github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          convex_args=$(jq -n \
            --arg artifact_content_json "${artifact_payload}" \
            --arg checked_at "$(date +%s%3N)" \
            --arg drill_id "${drill_id}" \
            --arg evidence_summary "${evidence_summary}" \
            --arg failure_reason "${failure_reason}" \
            --arg s3_key "${{ steps.upload.outputs.s3_key }}" \
            --arg zip_file "${{ steps.export.outputs.zip_file }}" \
            --arg status "${status}" \
            --arg summary "${summary}" \
            '{
              artifactContentJson: $artifact_content_json,
              checkedAt: ($checked_at | tonumber),
              drillId: $drill_id,
              drillType: "restore_verification",
              evidenceSummary: $evidence_summary,
              failureReason: if $failure_reason == "" then null else $failure_reason end,
              initiatedByKind: "system",
              initiatedByUserId: null,
              restoredItemCount: 0,
              sourceDataset: if $s3_key != "" then $s3_key else if $zip_file != "" then $zip_file else ("github-actions-run-" + $drill_id) end end,
              status: $status,
              summary: $summary,
              targetEnvironment: "test",
              verificationMethod: "github-actions-convex-export-restore"
            }')

          pnpm exec convex run securityOps:recordBackupVerification "${convex_args}" --typecheck disable
          echo "status=success" >> "$GITHUB_OUTPUT"
        env:
          AWS_DR_BACKUP_S3_BUCKET: ${{ secrets.AWS_DR_BACKUP_S3_BUCKET }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Weekly DR Backup - Convex -> S3"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Timestamp | \`${TIMESTAMP}\` |"
            echo "| File | \`${ZIP_FILE}\` |"
            echo "| Size | ${FILE_SIZE_MB} MB |"
            echo "| S3 Key | \`${S3_KEY}\` |"
            echo "| Bucket | \`${AWS_DR_BACKUP_S3_BUCKET}\` |"
            echo ""
            echo "Export status: **${{ steps.export.outcome }}**"
            echo "Upload status: **${{ steps.upload.outcome }}**"
            echo "Restore test: **${{ steps.restore_test.outcome }}**"
            echo "Deploy test: **${{ steps.deploy_test.outcome }}**"
            echo "Workspace report: **${{ steps.workspace_report.outputs.status || 'skipped' }}**"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          AWS_DR_BACKUP_S3_BUCKET: ${{ secrets.AWS_DR_BACKUP_S3_BUCKET }}
          FILE_SIZE_MB: ${{ steps.export.outputs.file_size_mb }}
          S3_KEY: ${{ steps.upload.outputs.s3_key }}
          TIMESTAMP: ${{ steps.export.outputs.timestamp }}
          ZIP_FILE: ${{ steps.export.outputs.zip_file }}
