name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  convex:
    name: Convex Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Convex boundaries
        run: pnpm run lint:convex
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  security:
    name: Security
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --audit-level critical --prod

      - name: Check admin audit guardrails
        run: pnpm run check:admin-audit-guardrails

      - name: Lint security policy boundaries
        run: pnpm run lint:security
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  osv_scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.3
        with:
          scan-args: |-
            --recursive
            --format table
            ./

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-22.04
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep SAST scan
        run: semgrep scan --config auto --error --severity ERROR

  sbom:
    name: SBOM
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM
        run: pnpm dlx @cyclonedx/cdxgen -o sbom.json --format json --type js

      - name: Verify SBOM output
        run: |
          test -s sbom.json
          sha256sum sbom.json >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  ssr_smoke:
    name: SSR Smoke
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and import SSR bundle
        run: pnpm run test:ssr-smoke
        env:
          NODE_OPTIONS: --max-old-space-size=4096
