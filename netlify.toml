[build]
command = "echo '🏗️ Starting build process...' && pnpm build && echo '🎉 Build completed successfully'"
publish = "dist/client"

[build.environment]
NODE_VERSION = "24"

# Deploy previews skip Convex deployment (use preview deployment instead)
[context.deploy-preview]
command = "echo '🏗️ Building preview (skipping Convex deploy)...' && pnpm build && echo '🎉 Preview build completed successfully'"

[[headers]]
for = "/*"

[headers.values]
Permissions-Policy = "camera=(), geolocation=(), microphone=(), payment=(), usb=(), browsing-topics=()"
Referrer-Policy = "strict-origin-when-cross-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"

[[headers]]
for = "/"

[headers.values]
Cache-Control = "no-store, max-age=0"

[[headers]]
for = "/register"

[headers.values]
Cache-Control = "no-store, max-age=0"

[[headers]]
for = "/app/*"

[headers.values]
Cache-Control = "no-store, max-age=0"

[[redirects]]
from = "/app/*"
to = "/index.html"
status = 200
